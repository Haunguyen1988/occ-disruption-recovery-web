name: CI

on:
  pull_request:
    branches: [main, bootstrap-main]
  push:
    branches: [main, bootstrap-main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          # Build doesn't actually need real Supabase creds — server components
          # use isSupabaseConfigured() to fall back to stub mode at runtime.
          # We provide harmless placeholders so any code that constructs the
          # client at build time doesn't crash.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
        run: npm run build
